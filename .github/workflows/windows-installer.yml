name: Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload installer to a GitHub release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Compile Electron main process
        run: npm run electron:compile

      - name: Build Windows installer
        run: npx electron-builder --win

      - name: Upload installer to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.upload_to_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
