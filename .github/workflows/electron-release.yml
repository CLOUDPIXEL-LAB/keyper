name: Build & Release

on:
  # Runs automatically when a version tag is pushed: git tag v1.1.0 && git push --tags
  push:
    tags:
      - "v*"
  # Also allows manual triggering — useful for adding builds to an existing release
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload to (e.g. v1.1.0)"
        required: true
        default: "v1.1.0"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Windows — NSIS installer (.exe)
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app + compile Electron
        run: |
          npm run build
          npm run electron:compile

      - name: Package with electron-builder (NSIS)
        run: npx electron-builder --win --x64

      - name: Upload Windows installer to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $installer = Get-ChildItem -Path "dist-electron" -Filter "*.exe" -Recurse | Select-Object -First 1
          Write-Host "Uploading: $($installer.Name) to release $tag"
          gh release upload $tag "$($installer.FullName)" --clobber

  # ─────────────────────────────────────────────
  # Linux — AppImage + .deb (x64 + arm64)
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux Installers
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3-dev \
            libxss-dev \
            libxtst-dev \
            libatspi2.0-dev \
            libsecret-1-dev \
            libglib2.0-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app + compile Electron
        run: |
          npm run build
          npm run electron:compile

      - name: Package with electron-builder (AppImage + deb)
        run: npx electron-builder --linux AppImage deb --x64 --arm64

      - name: Upload Linux installers to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          echo "Uploading Linux artifacts to release $TAG"
          find dist-electron -type f \( -name "*.AppImage" -o -name "*.deb" \) | while read -r f; do
            echo "  → $(basename "$f")"
            gh release upload "$TAG" "$f" --clobber
          done

  # ─────────────────────────────────────────────
  # Create the GitHub Release (if tag-triggered)
  # ─────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "Keyper $TAG" \
            --generate-notes \
            --draft
