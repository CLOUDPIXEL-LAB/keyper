# ╔══════════════════════════════════════════════════════════════════════════╗
# ║   🔐  Keyper  –  Electron Release Build                                 ║
# ║   Made with ❤️  by Pink Pixel  ✨  Dream it, Pixel it                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Triggers on:
#   • A tag push matching v* (e.g. v1.1.0) — creates a GitHub Release and
#     attaches all platform artefacts.
#   • Manual workflow_dispatch — useful for testing without tagging.
#
# Builds:
#   linux-build  → AppImage (x64/arm64) + .deb (x64/arm64)  on ubuntu-latest
#   windows-build → NSIS installer (.exe, x64)               on windows-latest
#
# To trigger a release:
#   git tag v1.1.0 && git push origin v1.1.0

name: Electron Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create GitHub Releases and upload artefacts

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  linux-build:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Build Linux packages (AppImage + deb)
        run: npx electron-builder --linux --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artefacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: error

  # ── Windows ────────────────────────────────────────────────────────────────
  windows-build:
    name: Windows (NSIS installer)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Compile Electron TypeScript
        # On Windows the CJS marker write uses node -e with double-quotes;
        # wrap in a shell: bash step to keep quoting consistent.
        shell: bash
        run: npm run electron:compile

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist-electron/*.exe
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────────
  # Runs after both platform builds succeed and only when the workflow was
  # triggered by a version tag (not a manual dispatch).
  release:
    name: Create GitHub Release
    needs: [linux-build, windows-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Linux artefacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artefacts/linux

      - name: Download Windows artefacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: artefacts/windows

      - name: Create GitHub Release and upload artefacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Keyper ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artefacts/linux/*.AppImage
            artefacts/linux/*.deb
            artefacts/windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
